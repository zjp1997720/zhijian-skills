<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc" data-composition="verified-loopback-route">
  <title id="title">WorkBuddy CLI Model Bridge</title>
  <desc id="desc">A verified loopback route connects CLI subscription models through a proxy to WorkBuddy.</desc>
