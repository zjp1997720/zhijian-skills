<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc" data-composition="three-route-decision">
  <title id="title">Light Plan and Work</title>
  <desc id="desc">A three-route execution system that highlights the light path from goal to verified result.</desc>
  <rect width="1200" height="360" rx="28" fill="#F8D7B8"/>
  <g data-composition="three-route-decision"><text x="52" y="52" fill="#F0642E" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="15" font-weight="800" letter-spacing="2">BOUNDED EXECUTION</text><text x="52" y="114" fill="#241A15" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="52" font-weight="760" >Light Plan</text><text x="52" y="168" fill="#241A15" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="52" font-weight="760" >and Work</text><text x="52" y="214" fill="#6E4F3E" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="22" font-weight="500" >Plan briefly. Start now. Verify the result.</text><rect x="42" y="261" width="320" height="50" rx="7" fill="#241A15" stroke="none" stroke-width="1" /><text x="62" y="294" fill="#FFF7EE" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="17" font-weight="750" >$light-plan-and-work</text><rect x="470" y="62" width="640" height="66" rx="8" fill="#FFF7EE" stroke="#C29C7C" stroke-width="2" /><text x="494" y="91" fill="#241A15" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="20" font-weight="850" >DIRECT</text><text x="640" y="91" fill="#241A15" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="17" font-weight="600" >tiny / obvious</text><rect x="470" y="144" width="640" height="66" rx="8" fill="#F0642E" stroke="#241A15" stroke-width="2" /><text x="494" y="173" fill="#241A15" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="20" font-weight="850" >LIGHT</text><text x="640" y="173" fill="#241A15" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="17" font-weight="600" >bounded / reversible</text><text x="640" y="197" fill="#FFF7EE" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="13" font-weight="800" >GOAL</text><line x1="694" y1="192" x2="722" y2="192" stroke="#FFF7EE" stroke-width="2" /><text x="744" y="197" fill="#FFF7EE" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="13" font-weight="800" >PLAN</text><line x1="798" y1="192" x2="826" y2="192" stroke="#FFF7EE" stroke-width="2" /><text x="848" y="197" fill="#FFF7EE" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="13" font-weight="800" >WORK</text><line x1="902" y1="192" x2="930" y2="192" stroke="#FFF7EE" stroke-width="2" /><text x="952" y="197" fill="#FFF7EE" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="13" font-weight="800" >VERIFY</text><rect x="470" y="240" width="640" height="66" rx="8" fill="#FFF7EE" stroke="#C29C7C" stroke-width="2" /><text x="494" y="269" fill="#241A15" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="20" font-weight="850" >HEAVY</text><text x="640" y="269" fill="#241A15" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="17" font-weight="600" >risky / multi-owner</text><text x="1110" y="334" fill="#241A15" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="14" font-weight="750" text-anchor="end">ESCALATE ONLY WHEN THE RISK CHANGES</text></g>
