<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc" data-composition="evidence-to-knowledge-core">
  <title id="title">Enterprise Clone Builder</title>
  <desc id="desc">Company documents, web evidence, voice, and cases flow into a traceable digital-twin repository.</desc>
  <rect width="1200" height="360" rx="28" fill="#163B2D"/>
