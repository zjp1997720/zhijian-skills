<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc" data-composition="radial-routing-control">
  <title id="title">Codex Model Routing Team</title>
  <desc id="desc">A lead Codex task routes bounded background work to explicit models and verifies the result.</desc>
  <rect width="1200" height="360" rx="28" fill="#101827"/>
  <g data-composition="radial-routing-control"><text x="52" y="55" fill="#66D9EF" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="15" font-weight="700" letter-spacing="2">CODEX ORCHESTRATION</text><text x="52" y="118" fill="#F7F5EF" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="48" font-weight="720" >Model Routing</text><text x="52" y="168" fill="#F7F5EF" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="48" font-weight="720" >Team</text><text x="52" y="212" fill="#A8B5C7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="21" font-weight="450" >One lead. Bounded workers. Explicit routes.</text><rect x="52" y="253" width="358" height="48" rx="8" fill="#18263A" stroke="#66D9EF" stroke-width="2" /><text x="72" y="284" fill="#F7F5EF" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="17" font-weight="700" >PLAN  /  DELEGATE  /  VERIFY</text><circle cx="760" cy="178" r="58" fill="#FF8A4C" stroke="none" stroke-width="1" /><text x="760" y="173" fill="#101827" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="19" font-weight="800" text-anchor="middle">LEAD</text><text x="760" y="198" fill="#101827" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="14" font-weight="650" text-anchor="middle">integrates</text><line x1="760" y1="178" x2="560" y2="86" stroke="#3B5975" stroke-width="3" /><rect x="468" y="50" width="184" height="72" rx="10" fill="#18263A" stroke="#66D9EF" stroke-width="2" /><text x="560" y="81" fill="#F7F5EF" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="16" font-weight="700" text-anchor="middle">RESEARCH</text><text x="560" y="106" fill="#66D9EF" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="14" font-weight="700" text-anchor="middle">LUNA</text><line x1="760" y1="178" x2="980" y2="86" stroke="#3B5975" stroke-width="3" /><rect x="888" y="50" width="184" height="72" rx="10" fill="#18263A" stroke="#FF8A4C" stroke-width="2" /><text x="980" y="81" fill="#F7F5EF" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="16" font-weight="700" text-anchor="middle">REVIEW</text><text x="980" y="106" fill="#FF8A4C" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="14" font-weight="700" text-anchor="middle">SOL</text><line x1="760" y1="178" x2="560" y2="270" stroke="#3B5975" stroke-width="3" /><rect x="468" y="234" width="184" height="72" rx="10" fill="#18263A" stroke="#FF8A4C" stroke-width="2" /><text x="560" y="265" fill="#F7F5EF" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="16" font-weight="700" text-anchor="middle">BUILD</text><text x="560" y="290" fill="#FF8A4C" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="14" font-weight="700" text-anchor="middle">GROK</text><line x1="760" y1="178" x2="980" y2="270" stroke="#3B5975" stroke-width="3" /><rect x="888" y="234" width="184" height="72" rx="10" fill="#18263A" stroke="#66D9EF" stroke-width="2" /><text x="980" y="265" fill="#F7F5EF" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="16" font-weight="700" text-anchor="middle">VERIFY</text><text x="980" y="290" fill="#66D9EF" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="14" font-weight="700" text-anchor="middle">LUNA</text><text x="760" y="338" fill="#8EA4B8" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="15" font-weight="500" text-anchor="middle">provider gate  •  file ownership  •  final evidence</text></g>
